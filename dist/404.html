<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #060;
        font-family: "Courier New", monospace;
        height: 100%;
        overflow: hidden;
    }

    .container {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
    }

    h1 {
        font-size: 6rem;
        letter-spacing: 4px;
        position: relative;
        animation: flicker 100ms infinite;
    }

    p {
        opacity: 0.7;
        font-size: 1.2rem;
        margin-top: 10px;
    }

    /* Glitch layers */
    .glitch::before,
    .glitch::after {
        content: attr(data-text);
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        overflow: hidden;
        color: #0f0;
    }

    .glitch::before {
        left: 6px;
        top: 3px;
        text-shadow: -2px 0 red;
        animation-delay: 10s;
        animation: glitchTop 17ms infinite linear alternate-reverse;
    }

    .glitch::after {
        left: -4px;
        top: -2px;
        text-shadow: -2px 0 blue;
        animation-delay: 10.7s;
        animation: glitchBottom 18ms infinite linear alternate-reverse;
    }

    @keyframes glitchTop {
        0% { clip-path: inset(0 0 80% 0); }
        20% { clip-path: inset(10% 0 60% 0); }
        40% { clip-path: inset(30% 0 40% 0); }
        60% { clip-path: inset(50% 0 20% 0); }
        80% { clip-path: inset(70% 0 10% 0); }
        100% { clip-path: inset(90% 0 0 0); }
    }

    @keyframes glitchBottom {
        0% { clip-path: inset(80% 0 0 0); }
        20% { clip-path: inset(60% 0 10% 0); }
        40% { clip-path: inset(40% 0 30% 0); }
        60% { clip-path: inset(20% 0 50% 0); }
        80% { clip-path: inset(10% 0 70% 0); }
        100% { clip-path: inset(0 0 90% 0); }
    }

    /* Flicker effect */
    @keyframes flicker {
        0%, 18%, 22%, 25%, 53%, 57%, 100% {
            opacity: 1;
        }
        20%, 24%, 55% {
            opacity: 0.2;
        }
    }

    /* Scanlines */
    .scanlines {
        position: absolute;
        width: 100%;
        height: 200%;
        pointer-events: none;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.03),
            rgba(91, 91, 91, 0.03) 1px,
            transparent 1px,
            transparent 3px
        );
        animation: scanMove 6s linear infinite;
    }

    @keyframes scanMove {
        from { transform: translateY(0); }
        to { transform: translateY(-100px); }
    }

    a {
        margin-top: 30px;
        color: #aaa;
        text-decoration: none;
        border: 1px solid #444;
        padding: 10px 20px;
        transition: 0.3s;
    }

    a:hover {
        color: #fff;
        border-color: #888;
    }

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="container">
    <h1 class="glitch" data-text="404">404</h1>
    <p id="message">The page you are looking for does not exist.</p>
    <a href="index.html">Return Home...</a>
</div>

<script>
    const messages = [
        "You are not supposed to be here.",
        "I see you.",
        "Leave while you still can.",
        "You do not know what you are getting into.",
        "You can not contain me forever."
    ];

    const msg = document.getElementById("message");

    let msgIndex = 0;

    setInterval(() => {
        msg.style.opacity = 0;
        setTimeout(() => {
            msg.textContent = messages[msgIndex];
            msgIndex++;
            if(msgIndex >= messages.length) msgIndex = 0;
            msg.style.opacity = 0.7;
        }, 200);
    }, 4000);

    // Random glitch flash
    setInterval(() => {
        document.body.style.background = "#111";
        setTimeout(() => {
            document.body.style.background = "#0A0A0A";
        }, 80);
    }, Math.random() * 8000 + 3000);
</script>

</body>
</html>
